<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Effects | Bas Milius</title>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="variant-grid" class="variant-grid" hidden></div>

<button id="nav-toggle" class="nav-toggle" aria-label="Toggle menu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
</button>

<nav id="nav">
    <button data-effect="confetti">Confetti</button>
    <button data-effect="fireworks">Fireworks</button>
    <button data-effect="fireworks-lab">Lab</button>
    <button data-effect="snow">Snow</button>
    <button data-effect="donuts">Donuts</button>
    <button data-effect="fireflies">Fireflies</button>
    <button data-effect="rain">Rain</button>
    <button data-effect="aurora">Aurora</button>
    <button data-effect="bubbles">Bubbles</button>
    <button data-effect="sparklers">Sparklers</button>
    <button data-effect="balloons">Balloons</button>
    <button data-effect="stars">Stars</button>
    <button data-effect="particles">Particles</button>
    <button data-effect="leaves">Leaves</button>
    <button data-effect="petals">Petals</button>
    <button data-effect="firepit">Firepit</button>
    <button data-effect="sandstorm">Sandstorm</button>
    <button data-effect="waves">Waves</button>
    <button data-effect="lanterns">Lanterns</button>
    <button data-effect="streamers">Streamers</button>
    <button data-effect="glitter">Glitter</button>
    <button data-effect="matrix">Matrix</button>
    <button data-effect="wormhole">Wormhole</button>
    <button data-effect="plasma">Plasma</button>
    <button data-effect="lightning">Lightning</button>
    <button data-effect="orbits">Orbits</button>
</nav>

<script type="module" src="./src/main.ts"></script>

</body>
</html>
